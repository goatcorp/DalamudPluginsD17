changelog = "TopSellingItems helps identify high-demand market board items using Universalis sales data. The plugin estimates sales velocity, highlights actively traded items, and provides configurable filters for worlds, data centers, prices, sales frequency, and profit potential to help players find items that are actually selling instead of relying only on listing prices."