changelog = "Introducing Eorzea Bingo!\n\na chat-driven multiplayer bingo game for Final Fantasy XIV\n\nKey Features:\n- Join or host multiplayer games using simple room codes.\n- Play on a classic 5x5 grid with numbers from 1 to 70.\n- Boards update automatically when the host rolls /random in chat.\n- Claim victory by completing a horizontal, vertical, or diagonal line.\n- Start every game with a guaranteed centre free space."
