[plugin]
repository = "https://github.com/seventity7/MaidenAlert.git"
commit = "2527651c96d03848766466de76d3e39d74a654ca"
owners = ["seventity7"]
maintainers = ["seventity7"]
project_path = "."
changelog = """
Maiden Alert notify you when a Forlorn Maiden appears during FATEs.
Designed to make Maiden spawns easier to notice, especially when you are focused on combat, moving between FATEs & etc.

## Features
- Sends an in-game chat notification when a Maiden appears
- Plays a sound alert so the spawn is harder to miss
- Shows a on-screen overlay to track the Maiden after it appears
- Displays useful distance/status information while the Maiden is being tracked
- Automatically follows the current game client language for plugin messages/detections where supported

## Language support
Supported languages for translations:
- English
- Japanese
- German
- French

The plugin can still detect and notify you about Maiden spawns regardless of language.
"""
