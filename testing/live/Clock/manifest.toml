[plugin]
repository = "https://github.com/seventity7/Clock.git"
commit = "c071c855c5f62e45138ac93bbafc3f51753e0f5e"
owners = ["seventity7"]
maintainers = ["seventity7"]
project_path = "."
changelog = """
- Added optional "snooze" option for alarms with configurable durations
  - Snoozed alarms trigger after the configurated time
- Added more time format options
  - Includes seconds, weekday and date display presets
  - /clock format now supports the new presets
- Added plugin UI language selection
  - Plugin text can now be changed from the settings window
### Important:
- Added manual Lodestone maintenance checks
  - Includes selectable Lodestone notice language
  - Shows feedback when no active or upcoming maintenance is found
  - Improved notice parsing to better support localized Lodestone date formats
"""