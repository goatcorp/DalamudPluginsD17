changelog = "Introducing Chocobo Racing!\n\na chat-driven multiplayer minigame plugin for Final Fantasy XIV\n\nKey Features:\n- Multiplayer racing for 2 to 10 chocobos with progress determined by host /random rolls.\n- Chat-based synchronisation via Say, Party and Alliance channels.\n- Customisable race settings including participant counts and finish line distances.\n- Visual race track interface featuring smooth animations and winner highlights."