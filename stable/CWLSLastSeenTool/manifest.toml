[plugin]
repository = "https://github.com/radax864/CWLSLastSeenTool.git"
commit = "257acdfce6f412fbea3f80f0626c5960652c20be"
owners = ["radax864"]
project_path = "CWLSLastSeenTool"
changelog = """
Version 2.0.2.0

- Linkshell and Cross-world Linkshell members that have been cached but have not yet been seen online will now display Never Seen under the Last Seen column and the date they were cached under the Days Since column. Sorting functions the same as before and stored data has not been changed.
- Remove List and Merge/Update List options under Advanced Options now use their own pick lists for better user experience.
- General optimisation. Data for display tables is now only regenerated/read from plugin configuration storage and sorted when required instead of every frame.


Version 2.0.1.0

- Update to Dalamud SDK 15 for patch 7.50


Version 2.0.0.0

- CWLSLastSeenTool has been renamed to Linkshell Tools
- The /cwlslst command has been renamed to /shelltools
- Data recorded has been standardised between Cross-world and Home World Linkshells
- A lot of the plugin has been rewritten to be easier to maintain and extend going forward
- Cross-world Linkshells now properly support multiple data centers by recording the data center alongside the Cross-world Linkshell name
- Fixed CSV corruption when Linkshell names contained commas (data is now stored as tab separated)
"""
