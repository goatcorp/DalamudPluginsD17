[plugin]
repository = "https://github.com/Elypha/BilingualTooltips.git"
commit = "86bbd1568a1f1643803e7deeea27b820632bb055"
owners = ["Elypha"]
project_path = "BilingualTooltips"
changelog = """
v1.7.1.0

This is a major update and please check against your current settings after updating, as some settings have been renamed or removed.

- Add support for NPC dialogues.
- Add support for a few more actions/items (DeepDungeon, minions/mounts, Bozjan, etc.).
- Add lookup history window to show some statistics about your bilingual exploration.
- Add support for all FFXIV official languages (JEDF plus Chinese and Korean, WIP).

v1.7.2.0 ~ v1.7.6.0
- Fix NPC dialogue matching issue for alphabetic languages (English, French, German, etc.).
- Fix long tooltips going beyond the screen.
- Gaps before/after the divider line between the translated description and the native one are now configurable in pixels.
- Tooltip layout is computed more accurately for better alignment/less chance to break.
- Fix the issue where the config window still pops up when the NPC dialogue feature is disabled.
"""
